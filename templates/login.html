<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff3a;
    --text: #f0f0f0;
    --muted: #666;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,255,58,0.06) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
  }
  .container {
    width: 100%;
    max-width: 380px;
    padding: 20px;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 40px;
  }
  .field {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }
  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 2px;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    padding: 16px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    margin-top: 12px;
    transition: opacity 0.2s;
    border-radius: 2px;
  }
  button:hover { opacity: 0.85; }
  .error {
    background: rgba(255,80,80,0.12);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    border-radius: 2px;
  }
  .admin-link {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  .admin-link a {
    color: var(--accent);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
  }
  .remember input { width: auto; accent-color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Sistema de Inventario</div>
  <h1>Bienvenido</h1>
  <p class="subtitle">Ingresa tus credenciales para continuar</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login" onsubmit="guardarUsuario()">
    <div class="field">
      <label>Usuario</label>
      <input type="text" name="usuario" id="campo-usuario" autocomplete="username" autofocus required/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="contrasena" autocomplete="current-password" required/>
    </div>
    <label class="remember">
      <input type="checkbox" id="recordar"/> Recordar usuario
    </label>
    <button type="submit">Entrar</button>
  </form>

  <div class="admin-link">
    ¿Eres administrador? <a href="/admin">Panel Admin</a>
  </div>
</div>
<script>
  // Cargar usuario guardado
  const usuarioGuardado = localStorage.getItem('inventario_usuario');
  if (usuarioGuardado) {
    document.getElementById('campo-usuario').value = usuarioGuardado;
    document.getElementById('recordar').checked = true;
  }
  function guardarUsuario() {
    const recordar = document.getElementById('recordar').checked;
    const usuario = document.getElementById('campo-usuario').value;
    if (recordar) localStorage.setItem('inventario_usuario', usuario);
    else localStorage.removeItem('inventario_usuario');
  }
</script>
</body>
</html>
