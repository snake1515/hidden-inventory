<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario</title>
<style>

:root {
    --bg: #f0f2f5;
    --white: #ffffff;
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --success: #28a745;
    --success-dark: #1e7e34;
    --text: #202124;
    --text-soft: #5f6368;
    --border: #dadce0;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    min-height: 100vh;
}

h1 {
    text-align: center;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
    letter-spacing: -0.5px;
}

.top-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

#busqueda {
    flex: 1;
    min-width: 0;
    padding: 12px 16px;
    font-size: 16px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
    box-shadow: var(--shadow);
}

#busqueda:focus { border-color: var(--primary); }

.descargar-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: var(--shadow);
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.descargar-btn:hover { background: var(--primary-dark); }

.tabla-wrapper {
    overflow-x: auto;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    background: var(--white);
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}

th {
    background: #222;
    color: white;
    padding: 12px 14px;
    text-align: left;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
}

td {
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 14px;
    vertical-align: middle;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8f9fa; }

.stock {
    width: 80px;
    padding: 6px 8px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    text-align: center;
    transition: border-color 0.2s, background 0.3s;
}

.stock:focus { outline: none; border-color: var(--primary); }

.guardar-btn {
    background: var(--success);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
}

.guardar-btn:hover { background: var(--success-dark); }

.cards-container {
    display: none;
    flex-direction: column;
    gap: 12px;
}

.card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    border-left: 4px solid var(--primary);
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 8px;
}

.card-nombre {
    font-weight: 700;
    font-size: 15px;
    line-height: 1.3;
    flex: 1;
}

.card-codigo {
    font-size: 12px;
    color: var(--text-soft);
    background: var(--bg);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
}

.card-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 6px;
    gap: 8px;
}

.card-row span:last-child {
    font-weight: 600;
    color: var(--text);
}

.card-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
}

.card-footer label {
    font-size: 13px;
    color: var(--text-soft);
    white-space: nowrap;
}

.card-footer .stock { flex: 1; max-width: 100px; }
.card-footer .guardar-btn { padding: 10px 16px; font-size: 14px; }

.card-fecha {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 6px;
}

@media (max-width: 640px) {
    body { padding: 12px; }
    .tabla-wrapper { display: none; }
    .cards-container { display: flex; }
    .top-bar { flex-direction: column; }
    .descargar-btn { width: 100%; text-align: center; }
}

@media (min-width: 641px) and (max-width: 900px) {
    body { padding: 16px; }
    table { min-width: 500px; }
    th, td { padding: 9px 10px; }
}
</style>
</head>
<body>

<h1>Inventario</h1>

<div class="top-bar">
    <input type="text" id="busqueda" placeholder="Buscar producto..." autocomplete="off">
    <button class="descargar-btn" onclick="window.location.href='/descargar'">⬇ Descargar Excel</button>
</div>

<div class="tabla-wrapper">
    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Grupo</th>
                <th>Bodega</th>
                <th>Almacén</th>
                <th>Últ. mod. cantidad</th>
                <th>Guardar</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<div class="cards-container" id="cards"></div>

<script>
const buscador = document.getElementById("busqueda");
const tabla = document.getElementById("tabla");
const cards = document.getElementById("cards");

buscador.addEventListener("keyup", async function () {
    let texto = buscador.value.trim();
    if (texto.length < 1) {
        tabla.innerHTML = "";
        cards.innerHTML = "";
        return;
    }
    let respuesta = await fetch(`/buscar?q=${texto}`);
    let productos = await respuesta.json();
    tabla.innerHTML = "";
    cards.innerHTML = "";

    productos.forEach(p => {
        tabla.innerHTML += `
        <tr>
            <td>${p.codigo}</td>
            <td>${p.nombre || ''}</td>
            <td>${p.grupo || ''}</td>
            <td><input class="stock" type="number" id="stock-${p.rowid}" value="${p.existencias_bodega || 0}"></td>
            <td>${p.existencias_almacen || 0}</td>
            <td id="fecha-${p.rowid}">${p.ultima_mod_cantidad || ''}</td>
            <td><button class="guardar-btn" onclick="guardar('${p.rowid}')">Guardar</button></td>
        </tr>`;

        cards.innerHTML += `
        <div class="card">
            <div class="card-header">
                <div class="card-nombre">${p.nombre || ''}</div>
                <div class="card-codigo">${p.codigo}</div>
            </div>
            <div class="card-row"><span>Grupo</span><span>${p.grupo || '—'}</span></div>
            <div class="card-row"><span>Almacén</span><span>${p.existencias_almacen || 0}</span></div>
            <div class="card-footer">
                <label>Bodega</label>
                <input class="stock" type="number" id="stock-m-${p.rowid}" value="${p.existencias_bodega || 0}">
                <button class="guardar-btn" onclick="guardarMovil('${p.rowid}')">Guardar</button>
            </div>
            <div class="card-fecha" id="fecha-m-${p.rowid}">${p.ultima_mod_cantidad ? 'Cantidad modificada el ' + p.ultima_mod_cantidad : ''}</div>
        </div>`;
    });
});

async function guardar(rowid) {
    let input = document.getElementById(`stock-${rowid}`);
    await actualizarStock(rowid, input.value, input, `fecha-${rowid}`);
}

async function guardarMovil(rowid) {
    let input = document.getElementById(`stock-m-${rowid}`);
    await actualizarStock(rowid, input.value, input, `fecha-m-${rowid}`);
    let inputDesktop = document.getElementById(`stock-${rowid}`);
    if (inputDesktop) inputDesktop.value = input.value;
}

async function actualizarStock(rowid, valor, inputEl, fechaId) {
    let respuesta = await fetch('/actualizar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rowid, existencias_bodega: valor })
    });
    let data = await respuesta.json();
    let fechaEl = document.getElementById(fechaId);
    if (fechaEl) fechaEl.innerText = fechaId.startsWith('fecha-m-') ? 'Cantidad modificada el ' + data.fecha : data.fecha;
    inputEl.style.background = "#b7ffb7";
    setTimeout(() => { inputEl.style.background = ""; }, 700);
}
</script>

</body>
</html>
