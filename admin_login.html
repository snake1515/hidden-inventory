<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Inventario</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
}

h1 { text-align: center; font-size: 1.5rem; margin-bottom: 8px; color: #202124; }

.subtitulo { text-align: center; color: #5f6368; font-size: 14px; margin-bottom: 28px; }

label { display: block; font-size: 13px; font-weight: 600; color: #5f6368; margin-bottom: 6px; margin-top: 16px; }

input[type="text"], input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1.5px solid #dadce0;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
}

input:focus { border-color: #1a73e8; }

.error {
    background: #fce8e6;
    color: #c5221f;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 16px;
    text-align: center;
}

button[type="submit"] {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

button[type="submit"]:hover { background: #1557b0; }

.volver { display: block; text-align: center; margin-top: 16px; font-size: 14px; color: #1a73e8; text-decoration: none; }
.volver:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
    <h1>🔐 Admin</h1>
    <p class="subtitulo">Acceso de administrador</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>Usuario</label>
        <input type="text" name="usuario" placeholder="Tu usuario" autocomplete="off" required>
        <label>Contraseña</label>
        <input type="password" name="contrasena" placeholder="Tu contraseña" required>
        <button type="submit">Entrar</button>
    </form>

    <a class="volver" href="/">← Volver al inventario</a>
</div>
</body>
</html>
